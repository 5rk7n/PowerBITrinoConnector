name: Release Trino.mez

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Trino.mez
        run: |
          cd Trino
          zip -r ../Trino.mez . -i \*.pq \*.png \*.resx \*.pqm -x Trino.query.pq
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trino.mez
          path: Trino.mez

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: Trino.mez
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
